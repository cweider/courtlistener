name: Automate build and deploy
on:
  push:
    branches: ["**"]

env:
  AWS_REGION: us-west-2
  EKS_CLUSTER_NAME: courtlistener
  EKS_NAMESPACE: court-listener

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      imageid: ${{ steps.build_push.outputs.imageid }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push
        id: build_push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: docker/django/Dockerfile
          push: true
          tags: |
            cweider2/courtlistener:latest
            cweider2/courtlistener:${{github.sha}}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Placeholder
        run: echo "sha_short=${{ needs.build.outputs.imageid }}"
